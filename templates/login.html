<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial;
            background:#111827;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .container{
            width:400px;
            background:#1f2937;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .input-group{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            font-size:16px;
            outline:none;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        .bottom-text{
            margin-top:20px;
            text-align:center;
        }

        a{
            color:#38bdf8;
            text-decoration:none;
        }

        .message{
            margin-top:15px;
            text-align:center;
            color:#f87171;
        }

    </style>
</head>
<body>

    <div class="container">

        <h1>Login</h1>

        <form method="POST" id="loginForm">

            <div class="input-group">
                <input
                    type="text"
                    name="username"
                    id="username"
                    placeholder="Username"
                    required
                >
            </div>

            <div class="input-group">
                <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="Password"
                    required
                >
            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <div class="bottom-text">
            Don't have an account?
            <a href="/register">
                Register
            </a>
        </div>

        <div class="message" id="message"></div>

    </div>

    <script>

        const form = document.getElementById("loginForm");

        form.addEventListener("submit", function(e){

            const username = document.getElementById("username").value;

            const password = document.getElementById("password").value;

            if(username.trim() === ""){

                e.preventDefault();

                document.getElementById("message").innerText =
                    "Username is required";

                return;
            }

            if(password.trim() === ""){

                e.preventDefault();

                document.getElementById("message").innerText =
                    "Password is required";

                return;
            }

        });

    </script>

</body>
</html>
